<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">finance</div>
            <nav>
                <div class="nav-item active">Overview</div>
                <div class="nav-item">Transactions</div>
                <div class="nav-item">Budgets</div>
                <div class="nav-item">Pots</div>
                <div class="nav-item">Recurring Bills</div>
            </nav>
            <div class="minimize">Minimize Menu</div>
        </aside>

        <main class="content">
            <h1>Overview</h1>

            <div class="top-stats">
                <div class="card dark">
                    <p>Current Balance</p>
                    <h2>$4,836.00</h2>
                </div>
                <div class="card">
                    <p>Income</p>
                    <h2>$3,814.25</h2>
                </div>
                <div class="card">
                    <p>Expenses</p>
                    <h2>$1,700.50</h2>
                </div>
            </div>

            <div class="main-grid">
                <div class="card pots">
                    <div class="card-header"><h3>Pots</h3> <span>See Details</span></div>
                    <div class="total-saved">
                        <p>Total Saved</p>
                        <h3>$850</h3>
                    </div>
                </div>

                <div class="card budgets">
                    <div class="card-header"><h3>Budgets</h3> <span>See Details</span></div>
                    </div>

                <div class="card transactions">
                    <div class="card-header"><h3>Transactions</h3> <span>View All</span></div>
                    </div>
            </div>
        </main>
    </div>

</body>
</html>
